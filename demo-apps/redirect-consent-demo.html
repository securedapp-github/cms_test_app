<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirect Consent Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    p { margin-top: 0.25rem; }
    .card { background: #f8fafc; border: 1px solid #dbeafe; border-radius: 10px; padding: 1rem; margin-top: 1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; }
    input, select, button { width: 100%; box-sizing: border-box; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; }
    button { background: #4f46e5; color: #fff; border: none; cursor: pointer; }
    button.secondary { background: #0f766e; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .row { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
    .row > * { flex: 1; }
    code { background: #e2e8f0; padding: 0.1rem 0.35rem; border-radius: 5px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f1f5f9; padding: 0.8rem; border-radius: 8px; border: 1px solid #cbd5e1; }
  </style>
</head>
<body>
  <h1>Redirect Consent Test App</h1>
  <p>Flow: enter user email + phone -> create redirect URL -> open hosted OTP page in popup -> send OTP -> verify OTP -> consent granted.</p>

  <div class="card">
    <div class="grid">
      <div>
        <label for="apiUrl">API URL</label>
        <input id="apiUrl" value="http://localhost:3000" />
      </div>
      <div>
        <label for="apiKey">x-api-key</label>
        <input id="apiKey" placeholder="Paste tenant API key" />
      </div>
      <div>
        <label for="appId">app_id</label>
        <input id="appId" placeholder="App UUID" />
      </div>
      <div>
        <label for="purposeId">purpose_id</label>
        <input id="purposeId" placeholder="Purpose UUID" />
      </div>
      <div>
        <label for="policyVersionId">policy_version_id</label>
        <input id="policyVersionId" placeholder="Policy Version UUID" />
      </div>
      <div>
        <label for="email">email</label>
        <input id="email" type="email" placeholder="user@example.com" />
      </div>
      <div>
        <label for="phoneNumber">phone_number</label>
        <input id="phoneNumber" placeholder="+919876543210" />
      </div>
    </div>

    <div class="row">
      <button id="prefillBtn" type="button" class="secondary">Prefill policy/purpose</button>
      <button id="createBtn" type="button">Create Redirect URL + Open Popup</button>
    </div>
    <p style="font-size: 0.85rem;" id="popupHint"></p>
  </div>

  <div class="card">
    <label>Last API response</label>
    <pre id="result">(Response will appear here)</pre>
  </div>

  <script>
    (function () {
      var hint = document.getElementById('popupHint');
      if (hint) {
        hint.innerHTML = 'If popup is blocked, allow popups for <code>' + location.origin + '</code>.';
      }
    })();

    const resultEl = document.getElementById('result');
    const apiUrlEl = document.getElementById('apiUrl');
    const apiKeyEl = document.getElementById('apiKey');
    const appIdEl = document.getElementById('appId');
    const purposeIdEl = document.getElementById('purposeId');
    const policyVersionIdEl = document.getElementById('policyVersionId');
    const emailEl = document.getElementById('email');
    const phoneNumberEl = document.getElementById('phoneNumber');
    const createBtn = document.getElementById('createBtn');
    const prefillBtn = document.getElementById('prefillBtn');

    function setResult(obj) {
      resultEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
    }

    function getBaseUrl() {
      return (apiUrlEl.value || '').trim().replace(/\/+$/, '');
    }

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      let data = null;
      try { data = await res.json(); } catch (_) { data = { error: 'Invalid JSON response' }; }
      if (!res.ok) {
        const message = (data && data.error) || `Request failed (${res.status})`;
        throw new Error(message);
      }
      return data;
    }

    prefillBtn.onclick = async () => {
      const apiUrl = getBaseUrl();
      const apiKey = apiKeyEl.value.trim();
      const appId = appIdEl.value.trim();
      if (!apiUrl || !apiKey || !appId) {
        setResult('Please fill API URL, x-api-key, and app_id first.');
        return;
      }

      prefillBtn.disabled = true;
      setResult('Fetching purposes and active policy...');
      try {
        const headers = { 'x-api-key': apiKey };
        const [purposesRes, policyRes] = await Promise.all([
          fetchJson(`${apiUrl}/public/purposes`, { headers }),
          fetchJson(`${apiUrl}/public/apps/${encodeURIComponent(appId)}/policy`, { headers }),
        ]);

        if (Array.isArray(purposesRes.purposes) && purposesRes.purposes.length > 0) {
          purposeIdEl.value = purposesRes.purposes[0].id;
        }
        if (policyRes.policyVersion && policyRes.policyVersion.id) {
          policyVersionIdEl.value = policyRes.policyVersion.id;
        }
        setResult({
          message: 'Prefill success',
          selected_purpose_id: purposeIdEl.value || null,
          selected_policy_version_id: policyVersionIdEl.value || null,
        });
      } catch (err) {
        setResult(`Prefill failed: ${err.message}`);
      } finally {
        prefillBtn.disabled = false;
      }
    };

    createBtn.onclick = async () => {
      const apiUrl = getBaseUrl();
      const apiKey = apiKeyEl.value.trim();
      const appId = appIdEl.value.trim();
      const purposeId = purposeIdEl.value.trim();
      const policyVersionId = policyVersionIdEl.value.trim();
      const email = emailEl.value.trim();
      const phoneNumber = phoneNumberEl.value.trim();

      if (!apiUrl || !apiKey || !appId || !purposeId || !policyVersionId || !email || !phoneNumber) {
        setResult('Please fill all fields before creating redirect URL.');
        return;
      }

      createBtn.disabled = true;
      setResult('Creating redirect consent request...');
      try {
        const data = await fetchJson(
          `${apiUrl}/public/apps/${encodeURIComponent(appId)}/consent/redirect/request`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
            },
            body: JSON.stringify({
              email,
              phone_number: phoneNumber,
              purpose_id: purposeId,
              policy_version_id: policyVersionId,
            }),
          }
        );

        setResult(data);
        if (!data.redirect_url) {
          throw new Error('redirect_url missing in response');
        }

        const popup = window.open(
          data.redirect_url,
          'redirect-consent-popup',
          'popup=yes,width=520,height=760,resizable=yes,scrollbars=yes'
        );
        if (!popup) {
          setResult({
            ...data,
            note: 'Popup blocked by browser. Open redirect_url manually.',
          });
        }
      } catch (err) {
        setResult(`Create redirect request failed: ${err.message}`);
      } finally {
        createBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
